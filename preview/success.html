<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Order confirmed — Tan Bomb</title>
  <link rel="stylesheet" href="../assets/theme.css">
  <link rel="icon" href="../assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #f5f2ee;
    }

    body.template-index {
      min-height: 100svh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #ffffff 0%, #faf8f5 42%, #f5f2ee 100%);
    }

    .checkout-result {
      flex: 1 1 auto;
      width: 100%;
      min-height: 100svh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding:
        max(2rem, env(safe-area-inset-top))
        max(1.5rem, env(safe-area-inset-right))
        max(2rem, env(safe-area-inset-bottom))
        max(1.5rem, env(safe-area-inset-left));
      box-sizing: border-box;
      background: transparent;
    }

    .checkout-result h1 {
      font-family: var(--font-heading, Georgia, serif);
      font-size: clamp(2rem, 6vw, 3rem);
      color: #AD2234;
      margin: 0 0 1rem;
    }

    .checkout-result p {
      max-width: 28rem;
      margin: 0 0 2rem;
      color: #292624;
      line-height: 1.6;
    }
  </style>
</head>
<body class="template-index">
  <main class="checkout-result">
    <p class="section--hero__eyebrow" style="margin-bottom: 0.75rem;">Tan Bomb</p>
    <h1>You're all set 🍒</h1>
    <p>Thanks for your order. A confirmation email is on its way, and Stripe will also send your payment receipt. We'll be in touch about shipping.</p>
    <a href="/" class="btn btn--primary">Back to home</a>
  </main>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var sessionId = params.get('session_id');
      if (!sessionId) return;

      fetch('/api/send-order-confirmation', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId })
      }).catch(function () {
        /* Webhook is the backup — ignore client send failures */
      });
    })();
  </script>
</body>
</html>
