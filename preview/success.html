<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Order confirmed — Tan Bomb</title>
  <link rel="stylesheet" href="../assets/theme.css">
  <style>
    .checkout-result {
      min-height: 70svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 1.5rem 3rem;
      background: linear-gradient(180deg, #ffffff 0%, #faf8f5 50%, #f5f2ee 100%);
    }
    .checkout-result h1 {
      font-family: var(--font-heading, Georgia, serif);
      font-size: clamp(2rem, 6vw, 3rem);
      color: #AD2234;
      margin: 0 0 1rem;
    }
    .checkout-result p {
      max-width: 28rem;
      margin: 0 0 2rem;
      color: #292624;
      line-height: 1.6;
    }
  </style>
</head>
<body class="template-index">
  <main class="checkout-result">
    <p class="section--hero__eyebrow" style="margin-bottom: 0.75rem;">Tan Bomb</p>
    <h1>You're all set 🍒</h1>
    <p>Thanks for your order. Stripe will email your order confirmation and receipt shortly. We'll be in touch about shipping.</p>
    <a href="/" class="btn btn--primary">Back to home</a>
  </main>
</body>
</html>
